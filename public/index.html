
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财智 · 个人财务规划助理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;background:linear-gradient(135deg,#0a0f1e 0%,#0d1b2a 50%,#0a1628 100%);font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;color:white}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(62,255,160,0.3);border-radius:2px}

  /* 登录页 */
  .login-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;width:100%;max-width:400px}
  .login-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px;width:100%;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,0.4)}
  .login-logo{text-align:center;margin-bottom:24px}
  .login-logo .icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#1a8c56,#3effa0);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;box-shadow:0 4px 20px rgba(62,255,160,0.3)}
  .login-logo h1{font-size:22px;font-weight:700;background:linear-gradient(90deg,#fff,#3effa0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .login-logo p{color:rgba(255,255,255,0.4);font-size:13px;margin-top:4px}
  .login-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;color:white;font-size:15px;font-family:inherit;outline:none;margin-top:20px;transition:border-color 0.2s}
  .login-input:focus{border-color:#3effa0;box-shadow:0 0 0 3px rgba(62,255,160,0.1)}
  .login-input::placeholder{color:rgba(255,255,255,0.3)}
  .login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1a8c56,#22c974);border:none;border-radius:12px;color:white;font-size:16px;font-weight:600;cursor:pointer;margin-top:16px;transition:all 0.2s;font-family:inherit}
  .login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(62,255,160,0.3)}
  .login-error{color:#ff6b6b;font-size:13px;text-align:center;margin-top:12px;display:none}

  /* 主界面 */
  .main-page{display:none;flex-direction:column;align-items:center;width:100%}
  .header{width:100%;max-width:720px;display:flex;align-items:center;gap:14px;margin-bottom:24px}
  .logo{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#1a8c56,#3effa0);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 20px rgba(62,255,160,0.3);flex-shrink:0;animation:pulse 3s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.75}}
  .title{font-size:24px;font-weight:700;background:linear-gradient(90deg,#fff,#3effa0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
  .subtitle{color:rgba(255,255,255,0.4);font-size:13px;margin-top:2px}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .status{background:rgba(62,255,160,0.1);border:1px solid rgba(62,255,160,0.3);border-radius:20px;padding:4px 12px;color:#3effa0;font-size:12px}
  .logout-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:4px 12px;color:rgba(255,255,255,0.5);font-size:12px;cursor:pointer;transition:all 0.2s}
  .logout-btn:hover{border-color:rgba(255,100,100,0.5);color:#ff6b6b}
  .chat-box{width:100%;max-width:720px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:24px;display:flex;flex-direction:column;height:520px;backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,0.4);overflow:hidden}
  .messages{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:16px}
  .msg{display:flex;align-items:flex-end;gap:10px}.msg.user{justify-content:flex-end}
  .avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .avatar.ai{background:linear-gradient(135deg,#1a8c56,#3effa0)}.avatar.user{background:rgba(255,255,255,0.1)}
  .bubble{max-width:75%;padding:12px 16px;font-size:14px;line-height:1.7;color:rgba(255,255,255,0.9)}
  .bubble.ai{border-radius:18px 18px 18px 4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08)}
  .bubble.user{border-radius:18px 18px 4px 18px;background:linear-gradient(135deg,#1a5c3a,#1e7a4a);border:1px solid rgba(62,255,160,0.2)}
  @keyframes slideLeft{from{opacity:0;transform:translateX(-15px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideRight{from{opacity:0;transform:translateX(15px)}to{opacity:1;transform:translateX(0)}}
  .msg.ai{animation:slideLeft 0.3s ease}.msg.user{animation:slideRight 0.3s ease}
  .input-area{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.2)}
  .input-row{display:flex;gap:10px}
  #userInput{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:12px 16px;color:white;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s}
  #userInput:focus{border-color:#3effa0;box-shadow:0 0 0 3px rgba(62,255,160,0.1)}
  #userInput::placeholder{color:rgba(255,255,255,0.3)}
  #sendBtn{padding:12px 20px;background:#22c974;border:none;border-radius:14px;color:white;font-size:20px;cursor:pointer;transition:all 0.2s}
  #sendBtn:hover{background:#3effa0;transform:scale(1.05)}
  #sendBtn:disabled{background:rgba(62,255,160,0.2);cursor:not-allowed;transform:none}
  .suggestions{width:100%;max-width:720px;margin-top:16px;display:flex;flex-wrap:wrap;gap:8px}
  .suggest-btn{padding:8px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;color:rgba(255,255,255,0.6);font-size:13px;cursor:pointer;transition:all 0.2s;font-family:inherit}
  .suggest-btn:hover{background:rgba(62,255,160,0.15);border-color:#3effa0;color:#3effa0}
  .disclaimer{color:rgba(255,255,255,0.2);font-size:11px;margin-top:16px}
  .dots{display:flex;gap:6px;align-items:center;padding:6px 0}
  .dot{width:7px;height:7px;border-radius:50%;background:#3effa0;opacity:0.7;animation:bounce 1.4s infinite}
  .dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
</style>
</head>
<body>

<!-- 登录页 -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">💹</div>
      <h1>财智 · 财务规划助理</h1>
      <p>请输入访问密码</p>
    </div>
    <input type="password" class="login-input" id="passwordInput" placeholder="请输入密码..." />
    <button class="login-btn" onclick="checkPassword()">进入系统</button>
    <div class="login-error" id="loginError">密码错误，请重试</div>
  </div>
</div>

<!-- 主界面 -->
<div class="main-page" id="mainPage">
  <div class="header">
    <div class="logo">💹</div>
    <div>
      <div class="title">财智 · 财务规划助理</div>
      <div class="subtitle">AI驱动 · 专业财务建议 · 智能规划</div>
    </div>
    <div class="header-right">
      <div class="status">● 在线</div>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="chat-box">
    <div class="messages" id="messages">
      <div class="msg ai">
        <div class="avatar ai">💹</div>
        <div class="bubble ai">你好！我是 <strong>财智</strong>，你的个人财务规划助理 💰<br><br>我可以帮你制定预算、规划投资、分析收支，或解答任何财务问题。今天有什么我能帮你的？</div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="userInput" placeholder="输入你的财务问题，按 Enter 发送..." />
        <button id="sendBtn">↑</button>
      </div>
    </div>
  </div>

  <div class="suggestions">
    <button class="suggest-btn" onclick="sendSuggestion('如何制定月度预算？')">如何制定月度预算？</button>
    <button class="suggest-btn" onclick="sendSuggestion('我该如何开始投资基金？')">如何开始投资基金？</button>
    <button class="suggest-btn" onclick="sendSuggestion('怎样规划退休储蓄？')">怎样规划退休储蓄？</button>
    <button class="suggest-btn" onclick="sendSuggestion('如何快速还清信用卡债务？')">如何还清信用卡债务？</button>
    <button class="suggest-btn" onclick="sendSuggestion('月收入1万元如何分配才合理？')">月收入1万如何分配？</button>
  </div>
  <div class="disclaimer">⚠️ AI建议仅供参考，重大财务决策请咨询专业持牌顾问</div>
</div>

<script>
const ACCESS_PASSWORD = 'caizhi2024';

// 检查是否已登录
if(sessionStorage.getItem('loggedIn') === 'true') showMain();

function checkPassword() {
  const input = document.getElementById('passwordInput').value;
  if(input === ACCESS_PASSWORD) {
    sessionStorage.setItem('loggedIn', 'true');
    showMain();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('passwordInput').value = '';
  }
}

function showMain() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('mainPage').style.display = 'flex';
  document.getElementById('userInput').focus();
}

function logout() {
  sessionStorage.removeItem('loggedIn');
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('mainPage').style.display = 'none';
  document.getElementById('passwordInput').value = '';
}

document.getElementById('passwordInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') checkPassword();
});

let conversationHistory=[];
let isLoading=false;
const messagesEl=document.getElementById('messages');
const inputEl=document.getElementById('userInput');
const sendBtn=document.getElementById('sendBtn');

function scrollToBottom(){messagesEl.scrollTop=messagesEl.scrollHeight}
function addMessage(role,content){
  const msg=document.createElement('div');msg.className=`msg ${role}`;
  const avatar=document.createElement('div');avatar.className=`avatar ${role}`;avatar.textContent=role==='ai'?'💹':'👤';
  const bubble=document.createElement('div');bubble.className=`bubble ${role}`;
  bubble.innerHTML=content.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  if(role==='ai'){msg.appendChild(avatar);msg.appendChild(bubble)}else{msg.appendChild(bubble);msg.appendChild(avatar)}
  messagesEl.appendChild(msg);scrollToBottom()
}
function showTyping(){
  const msg=document.createElement('div');msg.className='msg ai';msg.id='typing';
  const avatar=document.createElement('div');avatar.className='avatar ai';avatar.textContent='💹';
  const bubble=document.createElement('div');bubble.className='bubble ai';
  bubble.innerHTML='<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msg.appendChild(avatar);msg.appendChild(bubble);messagesEl.appendChild(msg);scrollToBottom()
}
function removeTyping(){const el=document.getElementById('typing');if(el)el.remove()}

async function sendMessage(text){
  const userText=text||inputEl.value.trim();
  if(!userText||isLoading)return;
  inputEl.value='';isLoading=true;sendBtn.disabled=true;
  addMessage('user',userText);
  conversationHistory.push({role:'user',content:userText});
  showTyping();
  try{
    const response=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:conversationHistory})});
    const data=await response.json();
    if(data.error)throw new Error(data.error);
    const reply=data.content?.[0]?.text||'抱歉，暂时无法回答。';
    removeTyping();addMessage('ai',reply);
    conversationHistory.push({role:'assistant',content:reply});
  }catch(e){removeTyping();addMessage('ai','连接出错：'+(e.message||'请稍后重试'))}
  finally{isLoading=false;sendBtn.disabled=false;inputEl.focus()}
}
function sendSuggestion(text){if(!isLoading)sendMessage(text)}
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
sendBtn.addEventListener('click',()=>sendMessage());
</script>
</body>
</html>
